# Render service manifest (fill <repo> with your GitHub repo URL before using)
services:
  - type: web
    name: customs-mid-automation
    env: python
    repo: "<git_repository_url>"  # e.g. https://github.com/youruser/yourrepo
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: SECRET_KEY
        value: "${SECRET_KEY}"  # set in Render dashboard (or replace here)
      - key: FLASK_DEBUG
        value: "false"
